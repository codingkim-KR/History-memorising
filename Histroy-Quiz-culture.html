<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국사 고난도 모의 문제 — 수취 체제·신분제·사상과 문화</title>
<style>
:root{
  --paper:#faf8f3; --card:#ffffff; --ink:#26262a; --muted:#6f6f77; --line:#e4ded2; --line2:#efe9de;
  --c2:#0d7a63; --c2b:#e6f4f0; --c3:#3a5ba0; --c3b:#eaeef8; --c4:#a25a26; --c4b:#f7efe6;
  --ok:#1f8a4c; --okb:#e6f5ec; --no:#c0392b; --nob:#fbeae8; --navy:#1f2a3a;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--paper);color:var(--ink);
  font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",system-ui,sans-serif;
  line-height:1.72;font-size:16px;-webkit-text-size-adjust:100%}
.mono{font-family:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace}

/* header — 시험지 머리글 */
header.top{background:var(--navy);color:#fff;border-bottom:3px solid #c9a227}
header.top .in{max-width:880px;margin:0 auto;padding:22px 20px 18px}
header.top .eyebrow{letter-spacing:.2em;font-size:11.5px;color:#aebccd;font-weight:700;text-transform:uppercase}
header.top h1{margin:.3em 0 .15em;font-size:25px;letter-spacing:-.01em;line-height:1.25}
header.top .meta{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:10px;font-size:13px;color:#c8d3df}
header.top .meta b{color:#fff;font-weight:700}

/* sticky toolbar */
.bar{position:sticky;top:0;z-index:30;background:rgba(250,248,243,.93);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);}
.bar .in{max-width:880px;margin:0 auto;padding:9px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tabs{display:flex;gap:4px;flex-wrap:wrap}
.tab{border:1px solid var(--line);background:#fff;color:#555;border-radius:20px;padding:5px 13px;font-size:13px;cursor:pointer;font-weight:600}
.tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.spacer{flex:1 1 auto}
.score{font-size:13px;color:#444;background:#fff;border:1px solid var(--line);border-radius:8px;padding:5px 11px;white-space:nowrap}
.score b{font-weight:800}
.score .pct{color:var(--ok)}
.btn{border:1px solid var(--line);background:#fff;color:#444;border-radius:8px;padding:5px 11px;font-size:12.5px;cursor:pointer;font-weight:600}
.btn:hover{background:#f0ece2}
.btn.warn:hover{background:var(--nob);border-color:#e2b6b0;color:var(--no)}

main{max-width:880px;margin:0 auto;padding:18px 20px 90px}
.hint{font-size:13px;color:var(--muted);background:#fff;border:1px solid var(--line);border-left:4px solid #c9a227;border-radius:8px;padding:9px 13px;margin:4px 0 18px}

/* question card */
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 18px 16px;margin:16px 0;
  box-shadow:0 2px 10px rgba(0,0,0,.04);border-left-width:5px}
.card.u2{border-left-color:var(--c2)} .card.u3{border-left-color:var(--c3)} .card.u4{border-left-color:var(--c4)}
.qhead{display:flex;align-items:center;gap:9px;margin-bottom:11px;flex-wrap:wrap}
.qno{font-size:13px;font-weight:800;letter-spacing:.04em;color:#222;background:#f1ece2;border-radius:7px;padding:3px 9px}
.badge{font-size:11px;font-weight:800;letter-spacing:.02em;border-radius:6px;padding:3px 8px}
.b2{background:var(--c2b);color:var(--c2)} .b3{background:var(--c3b);color:var(--c3)} .b4{background:var(--c4b);color:var(--c4)}
.btype{background:#eee;color:#555;font-weight:700}
.qstem{font-size:15.5px;font-weight:600;margin:2px 0 12px;letter-spacing:-.01em;line-height:1.6}

/* stimulus boxes */
.stim{border-radius:10px;padding:11px 14px;margin:0 0 13px;font-size:14px}
.stim-tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.03em;border-radius:5px;padding:2px 8px;margin-bottom:6px}
.saryo{background:#f6f3ec;border:1px solid var(--line);border-left:4px solid #b9a25e}
.saryo .stim-tag{background:#b9a25e;color:#fff}
.saryo p{margin:.3em 0}
.saryo u{text-decoration:underline;text-underline-offset:3px;text-decoration-color:#c9a227}
.bogi{background:#fff;border:1.5px solid #cfd6e2}
.bogi .stim-tag{background:#5a6b86;color:#fff}
.bogi ul{margin:.2em 0 0;padding-left:1.1em;list-style:none}
.bogi li{margin:.3em 0;padding-left:.2em}

/* options — OMR bubble */
.opts{display:flex;flex-direction:column;gap:7px;margin-top:4px}
.opt{display:flex;align-items:flex-start;gap:11px;width:100%;text-align:left;cursor:pointer;
  background:#fff;border:1.5px solid var(--line2);border-radius:10px;padding:10px 13px;font-size:14.5px;
  color:var(--ink);transition:border-color .12s,background .12s;line-height:1.5;font-family:inherit}
.opt:hover:not(.locked){border-color:#c9a227;background:#fffdf5}
.opt:focus-visible{outline:2px solid var(--navy);outline-offset:2px}
.bub{flex:none;width:25px;height:25px;border-radius:50%;border:1.8px solid #b9b3a6;color:#8a8479;
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;margin-top:1px;transition:all .12s}
.opt:hover:not(.locked) .bub{border-color:#c9a227;color:#a9831a}
.opt .otext{flex:1}
.opts.locked .opt{cursor:default}
.opt.correct{background:var(--okb);border-color:#8fce9f}
.opt.correct .bub{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.wrong{background:var(--nob);border-color:#e2a9a1}
.opt.wrong .bub{background:var(--no);border-color:var(--no);color:#fff}
.opt .mark{margin-left:auto;flex:none;font-size:12.5px;font-weight:800;align-self:center;padding-left:8px}
.opt.correct .mark{color:var(--ok)} .opt.wrong .mark{color:var(--no)}

/* explanation */
.expl{margin-top:12px;border-radius:10px;padding:11px 14px 12px;font-size:13.8px;line-height:1.62;
  background:#f4f6f4;border:1px solid #dde6dd;border-left:4px solid var(--ok);display:none}
.expl.show{display:block;animation:slide .18s ease}
@keyframes slide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.expl .etag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.03em;background:var(--ok);color:#fff;border-radius:5px;padding:2px 8px;margin-right:7px}
.expl .ans{font-weight:800;color:var(--ok)}
.expl b{color:#1c1c1c}
.expl u{text-decoration-color:#c9a227;text-underline-offset:2px}

/* result panel */
.result{display:none;margin:22px 0 0;background:var(--navy);color:#fff;border-radius:14px;padding:20px 22px;text-align:center}
.result.show{display:block}
.result .big{font-size:34px;font-weight:800;letter-spacing:-.01em}
.result .big .pct{color:#ffd866}
.result .sub{color:#c8d3df;font-size:14px;margin-top:4px}
.result .by{display:flex;justify-content:center;gap:8px 16px;flex-wrap:wrap;margin-top:12px;font-size:13px}
.result .by span{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:4px 12px}

.empty{display:none;text-align:center;color:var(--muted);padding:40px 0;font-size:14px}
footer{max-width:880px;margin:0 auto;padding:0 20px 50px;color:var(--muted);font-size:12.5px;text-align:center}

@media(max-width:560px){
  header.top h1{font-size:21px}
  .qstem{font-size:15px}
  .opt{font-size:14px}
}
/* image stimulus */
.figbox{background:#fbfaf7}
.figbox .stim-tag{background:#8a7d63;color:#fff}
.bogi.figbox .stim-tag{background:#5a6b86;color:#fff}
.figrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:8px}
.figrow.grid4{grid-template-columns:repeat(2,1fr)}
@media(min-width:640px){.figrow.grid4{grid-template-columns:repeat(4,1fr)}}
.qfig{margin:0;background:#fff;border:1px solid var(--line2);border-radius:9px;padding:7px;text-align:center;position:relative}
.qfig img{width:100%;height:auto;max-height:280px;object-fit:contain;border-radius:5px;cursor:zoom-in;display:block}
.qfig figcaption{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.4}
.qfig .flab{position:absolute;top:9px;left:9px;background:var(--navy);color:#fff;font-weight:800;font-size:12.5px;border-radius:5px;padding:1px 8px;z-index:2}
#lb{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:99;cursor:zoom-out;padding:18px}
#lb img{max-width:96%;max-height:96%;border-radius:8px}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto}}
</style>
</head>
<body>
<header class="top"><div class="in">
<div class="eyebrow">한국사 · 고난도 실전 문제</div>
<h1>Ⅱ. 근대 이전 한국사 — 24문항 모의 평가</h1>
<div class="meta"><span><b>범위</b> 수취 체제·경제 / 신분제 / 사상과 문화</span>
<span><b>유형</b> 사료·인물·ㄱㄴㄷ 합답·순서 배열·비교·부정형</span>
<span><b>채점</b> 클릭 즉시 정답·해설</span></div>
</div></header>

<div class="bar"><div class="in">
<div class="tabs">
<button class="tab on" data-f="all">전체</button>
<button class="tab" data-f="2">경제</button>
<button class="tab" data-f="3">신분제</button>
<button class="tab" data-f="4">사상·문화</button>
</div>
<div class="spacer"></div>
<span class="score" id="scoreTxt"></span>
<button class="btn" id="revealBtn">정답·해설 모두 보기</button>
<button class="btn warn" id="resetBtn">다시 풀기</button>
</div></div>

<main>
<div class="hint">선택지(①~⑤)를 누르면 바로 채점되고 해설이 펼쳐져요. ㄱㄴㄷ 문항은 ⟨보기⟩를 먼저 읽고 알맞은 조합을 고르세요. 위 버튼으로 단원별로 풀거나, 전체 정답을 한꺼번에 펼쳐 볼 수 있어요.</div>
<div id="quiz"></div>
<div class="empty" id="empty">이 단원에는 표시할 문항이 없어요.</div>
<div class="result" id="result">
  <div class="big" id="resMain"></div>
  <div class="sub" id="resSub"></div>
  <div class="by" id="resBy"></div>
</div>
</main>
<div id="lb"><img src="" alt=""></div>
<footer>한국사 정리노트 짝꿍 문제집 · 틀린 문항은 해설을 읽고 정리노트에서 다시 확인해 보세요.</footer>

<script>
const Q = [{"u": 2, "t": "순서 배열", "src": "<div class=\"stim bogi\"><span class=\"stim-tag\">보기</span><ul><li>(가) 현직 관리에게만 수조권을 지급하였다.</li><li>(나) 국가가 조를 거두어 관리에게 지급하였다.</li><li>(다) 전·현직 관리에게 경기의 토지에 한해 수조권을 지급하였다.</li><li>(라) 관리에게 수조권을 주지 않고 녹봉만 지급하였다.</li></ul></div>", "q": "(가)~(라)를 시행된 시기 순으로 바르게 나열한 것은?", "c": ["(다)-(가)-(나)-(라)", "(다)-(나)-(가)-(라)", "(가)-(다)-(나)-(라)", "(다)-(가)-(라)-(나)", "(가)-(나)-(다)-(라)"], "a": 0, "e": "과전법(다, 전·현직에 경기 토지 수조권) → 직전법(가, 세조, 현직만) → 관수관급제(나, 성종, 국가가 대신 수취·지급) → 녹봉제(라, 16세기 중엽, 수조권 소멸). 수조권이 점차 약화·소멸하는 흐름이 핵심이다."}, {"u": 2, "t": "사료 · ㄱㄴㄷ", "src": "<div class=\"stim saryo\"><span class=\"stim-tag\">사료 — 『선조실록』</span><p>각 고을에서 공물을 바치려 하면 <u>사주인(방납인)이 갖은 핑계로 퇴짜를 놓고, 자기 물건을 대신 바치게 한 뒤 그 값을 10배로 받아낸다.</u> 이는 백성의 피땀을 짜내는 것입니다.</p></div><div class=\"stim bogi\"><span class=\"stim-tag\">보기</span><ul><li>ㄱ. 토지 결수를 기준으로 쌀·포·동전을 거두었다.</li><li>ㄴ. 관청에 물품을 조달하는 공인이 등장하는 계기가 되었다.</li><li>ㄷ. 풍흉에 따라 전세를 9등급으로 차등 부과하였다.</li><li>ㄹ. 경기도에서 시작되어 전국에 시행되기까지 100여 년이 걸렸다.</li></ul></div>", "q": "밑줄 친 폐단을 시정하기 위해 시행된 제도에 대한 설명으로 옳은 것만을 모두 고른 것은?", "c": ["ㄱ, ㄴ", "ㄱ, ㄷ", "ㄴ, ㄷ", "ㄱ, ㄴ, ㄹ", "ㄱ, ㄷ, ㄹ"], "a": 3, "e": "방납의 폐단 → <b>대동법</b>. ㄱ 토지 결수 기준으로 쌀·포·동전 징수 ○, ㄴ 관청에 물품을 조달하는 공인 등장 ○, ㄹ 1608년 경기도 시작 → 전국 확대까지 100여 년 ○. ㄷ은 세종의 <b>공법(연분9등법)</b> 설명으로 대동법과 무관하다."}, {"u": 2, "t": "부정형", "src": "", "q": "조선 후기 수취 제도 개편에 대한 설명으로 <b>옳지 않은</b> 것은?", "c": ["영정법은 풍흉에 관계없이 토지 1결당 4~6두를 거두었다.", "영정법은 토지가 없는 소작농의 부담을 크게 덜어 주었다.", "대동법의 시행은 상품 화폐 경제의 발달을 촉진하였다.", "균역법으로 군포 부담이 1년에 2필에서 1필로 줄었다.", "균역법의 재정 결손을 메우기 위해 지주에게 결작을 부과하였다."], "a": 1, "e": "영정법은 자기 소유의 토지가 없는 소작농에게는 도움이 되지 않았고, 여러 명목의 새 세금이 더해져 농민 부담이 크게 줄지 않았다. 따라서 ②가 옳지 않다. 나머지는 모두 옳다."}, {"u": 2, "t": "자료 비교 · ㄱㄴㄷ", "src": "<div class=\"stim saryo\"><span class=\"stim-tag\">자료</span><p><b>(가) 『숙종실록』</b> — 평생 부지런히 독서만 한 자가 한 글자도 읽지 않는 자와 똑같이 포를 내는 것은 억울하지 않겠습니까.</p><p><b>(나) 『영조실록』</b> — 임금이 백성에게 묻자 한양의 백성과 군인 50여 명이 모두 호포가 편하다고 답하였다.</p></div><div class=\"stim bogi\"><span class=\"stim-tag\">보기</span><ul><li>ㄱ. (가)는 양반에게도 군포를 부과하는 데 반대하는 입장이다.</li><li>ㄴ. (나)의 백성들은 집집마다 군포를 부과하는 방식을 선호하였다.</li><li>ㄷ. 이 논의의 결과 군포를 1년에 1필로 줄이는 제도가 시행되었다.</li><li>ㄹ. 부족한 재정은 부유한 상민에게 선무군관포를 거두어 보충하였다.</li></ul></div>", "q": "(가), (나)의 논의와 그 결과에 대한 설명으로 옳은 것만을 모두 고른 것은?", "c": ["ㄱ, ㄴ", "ㄷ, ㄹ", "ㄱ, ㄴ, ㄷ", "ㄴ, ㄷ, ㄹ", "ㄱ, ㄴ, ㄷ, ㄹ"], "a": 4, "e": "<b>전부 옳다.</b> (가)는 호포(양반에게도 군포 부과) 반대=양반 면역 유지 주장(ㄱ ○). (나)의 백성은 집집마다 부과하는 호포를 선호(ㄴ ○). 이 논의의 결과 군포를 1필로 줄인 <b>균역법</b> 시행(ㄷ ○), 부족분은 결작·선무군관포로 보충(ㄹ ○). '모두 옳은 것'을 고르게 하는 함정 문항이다."}, {"u": 2, "t": "사료 · 부정형", "src": "<div class=\"stim saryo\"><span class=\"stim-tag\">사료 — 『성호사설』</span><p>남쪽은 모두 모내기를 하는데, 드는 힘이 파종에 비하여 5분의 4가 적게 든다. 그러므로 부리는 사람이 많은 자는 한없이 경작할 수 있다.</p></div>", "q": "위 농법이 확산되면서 나타난 변화로 <b>옳지 않은</b> 것은?", "c": ["벼와 보리의 이모작이 가능해졌다.", "한 사람이 넓은 농지를 경작하는 광작이 가능해졌다.", "김매기에 드는 노동력이 늘어 농민의 부담이 가중되었다.", "일부 농민은 부농으로, 다수는 임노동자로 분화되었다.", "담배·인삼 등 상품 작물 재배가 확산되는 배경이 되었다."], "a": 2, "e": "모내기법(이앙법)은 제초(김매기) 노동을 크게 <b>줄여</b> 광작을 가능하게 했다. ③은 사실과 반대다. 노동력 절감 → 광작 → 농민층 분화(부농 vs 임노동자)로 이어졌다."}, {"u": 2, "t": "부정형", "src": "", "q": "조선 후기 상업의 변화에 대한 설명으로 <b>옳지 않은</b> 것은?", "c": ["정조 때 육의전을 제외한 시전의 금난전권을 폐지하였다.", "송상은 개성, 만상은 의주, 내상은 동래를 근거지로 삼았다.", "포구와 큰 장시에서 객주와 여각이 중개·금융업을 담당하였다.", "자본을 모은 일부 상인은 독점적 도매상인인 도고로 성장하였다.", "시전 상인이 난전 단속권을 새로 부여받아 사상의 활동이 위축되었다."], "a": 4, "e": "정조의 신해통공으로 (육의전 제외) 금난전권이 <b>폐지</b>되어 사상의 활동이 더욱 활발해졌다. ⑤는 흐름이 정반대다. 나머지는 모두 옳다."}, {"u": 3, "t": "사료 · ㄱㄴㄷ", "src": "<div class=\"stim saryo\"><span class=\"stim-tag\">사료 — 『삼국사기』</span><p>설계두가 말하기를 “신라는 사람을 등용하는 데 <u>골품</u>을 따진다. 진실로 그 족속이 아니면 비록 큰 재주와 뛰어난 공이 있어도 그 한계를 뛰어넘을 수 없다.”라고 하였다.</p></div><div class=\"stim bogi\"><span class=\"stim-tag\">보기</span><ul><li>ㄱ. 골품에 따라 오를 수 있는 관등의 상한이 정해져 있었다.</li><li>ㄴ. 가옥의 규모와 복색 등 일상생활까지 규제하였다.</li><li>ㄷ. 삼국 통일 이후 성골이 새롭게 등장하였다.</li><li>ㄹ. 6두품은 능력과 무관하게 일정 관등 이상 오를 수 없었다.</li></ul></div>", "q": "밑줄 친 제도에 대한 설명으로 옳은 것만을 모두 고른 것은?", "c": ["ㄱ, ㄴ", "ㄱ, ㄹ", "ㄴ, ㄷ", "ㄱ, ㄴ, ㄹ", "ㄱ, ㄷ, ㄹ"], "a": 3, "e": "골품제: 골품에 따라 오를 수 있는 관등의 상한이 정해지고(ㄱ ○), 가옥 규모·복색 등 일상생활까지 규제(ㄴ ○), 6두품은 능력과 무관하게 6관등(아찬)을 넘지 못함(ㄹ ○). ㄷ은 반대 — 성골은 통일 이후 <b>사라졌다</b>. ※ 설계두는 한계를 느껴 621년 당으로 건너갔다."}, {"u": 3, "t": "비교 · 부정형", "src": "", "q": "(가) 고려, (나) 조선 후기의 가족·여성 지위를 비교한 내용으로 <b>옳지 않은</b> 것은?", "c": ["(가) 재산을 아들과 딸에게 균등하게 상속하였다.", "(가) 사위와 외손도 음서의 혜택을 받을 수 있었다.", "(나) 제사는 주로 장자가 단독으로 지냈다.", "(나) 혼인 후 신랑이 신부 집에서 사는 것이 일반적이었다.", "(가)에서는 여성의 재가가 비교적 자유로웠으나 (나)에서는 사실상 제약되었다."], "a": 3, "e": "신랑이 처가에서 사는 <b>남귀여가혼</b>은 고려(가)의 특징이다. 조선 후기(나)는 신부가 곧장 신랑 집으로 가는 <b>친영</b>이 일반화되었다. ④는 (가)와 (나)가 뒤바뀐 진술이다."}, {"u": 3, "t": "자료 변화 · ㄱㄴㄷ", "src": "<div class=\"stim saryo\"><span class=\"stim-tag\">자료</span><p><b>① 『경국대전』</b> — 천인의 자녀는 어머니 쪽 역을 따르되, 천인 아버지·양인 어머니의 자녀는 아버지의 역을 따른다.</p><p><b>② (1731년)</b> — 양인 어머니에게서 난 자녀는 모두 어머니의 역을 따르게 한다.</p><p><b>③ (1801년)</b> — 중앙 관청의 공노비 문서를 돈화문 밖에서 불태웠다.</p></div><div class=\"stim bogi\"><span class=\"stim-tag\">보기</span><ul><li>ㄱ. ①에 따르면 부모 중 한쪽이 천인이면 자녀도 천인이 되었다.</li><li>ㄴ. ②는 양인 장정의 수를 늘리려는 목적이 있었다.</li><li>ㄷ. ③은 순조 때 공노비를 해방한 조치이다.</li><li>ㄹ. ①→②→③으로 갈수록 노비가 되기 쉬워졌다.</li></ul></div>", "q": "자료 ①~③에 대한 설명으로 옳은 것만을 모두 고른 것은?", "c": ["ㄱ, ㄴ", "ㄷ, ㄹ", "ㄱ, ㄴ, ㄷ", "ㄱ, ㄷ, ㄹ", "ㄴ, ㄷ, ㄹ"], "a": 2, "e": "① 일천즉천 — 부모 중 한쪽이 천인이면 자녀도 천인(ㄱ ○). ② 노비종모법 — 양인 장정 수를 늘리려는 목적(ㄴ ○). ③ 1801년 <b>순조</b>의 공노비 해방(ㄷ ○). ㄹ은 반대 — ①→②→③으로 갈수록 양인이 되기 쉬워져 노비가 감소했다."}, {"u": 3, "t": "사료 · ㄱㄴㄷ", "src": "<div class=\"stim saryo\"><span class=\"stim-tag\">사료 — 『일성록』</span><p>근래 상민과 천민이 갓을 쓰고 도포를 입어 마치 조정의 관리나 선비같이 하며, 심지어 시전 상인이나 군역 지는 상민까지도 서로 양반이라 부른다.</p></div><div class=\"stim bogi\"><span class=\"stim-tag\">보기</span><ul><li>ㄱ. 공명첩을 사들였다.</li><li>ㄴ. 납속책을 이용하였다.</li><li>ㄷ. 다른 가문의 족보를 위조하였다.</li><li>ㄹ. 군공을 세웠다.</li></ul></div>", "q": "이러한 현상이 나타난 시기에 상민이 신분을 상승시킨 <b>합법적</b> 방법으로 옳은 것만을 모두 고른 것은?", "c": ["ㄱ, ㄴ", "ㄱ, ㄷ", "ㄴ, ㄹ", "ㄱ, ㄴ, ㄹ", "ㄱ, ㄴ, ㄷ, ㄹ"], "a": 3, "e": "합법적 방법은 공명첩 구입(ㄱ), 납속(ㄴ), 군공(ㄹ)이다. 족보 위조(ㄷ)는 신분 상승 수단이긴 하나 <b>비합법적</b> 방법이므로 '합법'을 묻는 문항에서 제외된다. (ㄷ을 끼워 넣은 함정)"}, {"u": 3, "t": "부정형", "src": "", "q": "조선 후기 향촌 질서의 변화에 대한 설명으로 <b>옳지 않은</b> 것은?", "c": ["구향은 동족 마을·족보·문중 서원을 통해 지위를 지키려 하였다.", "경제력으로 성장한 신향은 수령과 결탁해 영향력을 키웠다.", "구향과 신향이 향촌 주도권을 두고 다투는 향전이 일어났다.", "향전의 결과 신향이 향촌 지배를 완전히 장악하였다.", "사족의 향촌 지배가 약화되면서 수령 중심의 국가 권력이 강화되었다."], "a": 3, "e": "향전의 결과 신향·구향 모두 향촌을 <b>완전히 장악하지 못했고</b>, 그 틈에 수령(국가 권력)이 향촌을 지배하게 되어 19세기 세도정치기 농민 수탈 심화의 배경이 되었다. ④가 옳지 않다."}, {"u": 3, "t": "사료 · 자료", "src": "<div class=\"stim saryo\"><span class=\"stim-tag\">자료</span><p><b>(가) 『고려사절요』</b> — 향리 이중선의 아들 이영이 부지런히 공부해 과거에 급제하고 사관·대간을 역임하였다.</p><p><b>(나) 『고려사』</b> — 노비 평량이 농사로 부유해지자 권세가에 뇌물을 주어 양인이 되고 산원동정 벼슬을 얻었다.</p></div>", "q": "(가), (나)를 통해 알 수 있는 고려 신분제의 특징으로 가장 적절한 것은?", "c": ["신분 이동이 전혀 불가능한 폐쇄적 사회였다.", "법제적으로는 양천제였으나 제한적인 신분 상승이 가능하였다.", "향·부곡·소의 주민이 일반 군현민과 동등한 대우를 받았다.", "모든 양인에게 과거를 통한 관직 진출이 보장되었다.", "노비는 매매·상속의 대상이 될 수 없었다."], "a": 1, "e": "향리의 아들(이영)이 과거로 관리가 되고, 노비(평량)가 양인이 된 사례는 고려가 신라보다 개방적·유동적이어서 <b>제한적 신분 상승</b>이 가능했음을 보여 준다(②). 고려는 법제적으로 양천제였다. ③·④·⑤는 사실과 어긋난다."}, {"u": 4, "t": "인물 · 부정형", "src": "", "q": "통일 신라 승려들의 활동으로 <b>옳지 않은</b> 것은?", "c": ["원효 — 일심·화쟁 사상을 펴고 아미타 신앙으로 불교를 대중화하였다.", "의상 — 화엄 사상을 정립하고 「화엄일승법계도」를 저술하였다.", "혜초 — 인도·서역을 순례하고 『왕오천축국전』을 남겼다.", "의상 — 종파의 대립을 화해시키려는 화쟁 사상을 주장하였다.", "원효 — 모든 것이 한마음에서 비롯된다는 일심 사상을 제시하였다."], "a": 3, "e": "<b>화쟁 사상</b>은 원효의 핵심 사상이다. 의상은 <b>화엄 사상</b>과 관음 신앙, 부석사 창건으로 대표된다. ④는 원효와 의상의 업적을 뒤섞은 함정이다."}, {"u": 4, "t": "사료 · ㄱㄴㄷ", "src": "<div class=\"stim saryo\"><span class=\"stim-tag\">사료</span><p><b>(가) 『삼국사기』</b> — 이차돈이 “소신의 목을 베어 논의를 진정시키소서.” 하니, 목을 베자 피가 우윳빛처럼 희었다.</p><p><b>(나) 『삼국유사』</b> — 신인이 자장에게 “절에 구층 탑을 세우면 이웃 아홉 나라가 항복하고 조공하여 나라가 평안하리라.” 하였다.</p></div><div class=\"stim bogi\"><span class=\"stim-tag\">보기</span><ul><li>ㄱ. (가)는 법흥왕 때 불교가 공인되는 계기를 보여 준다.</li><li>ㄴ. (나)는 불교가 국가의 안녕을 비는 호국적 성격을 띠었음을 보여 준다.</li><li>ㄷ. (가), (나)의 불교는 왕권을 뒷받침하는 기능을 하였다.</li><li>ㄹ. (나)의 탑은 현재까지 온전히 보존되어 있다.</li></ul></div>", "q": "(가), (나)에 대한 설명으로 옳은 것만을 모두 고른 것은?", "c": ["ㄱ, ㄴ", "ㄱ, ㄴ, ㄷ", "ㄱ, ㄷ, ㄹ", "ㄴ, ㄷ, ㄹ", "ㄱ, ㄴ, ㄷ, ㄹ"], "a": 1, "e": "(가) 이차돈 순교 = <b>법흥왕</b> 때 불교 공인의 계기(ㄱ ○). (나) 황룡사 구층 목탑 = 외적을 물리치려는 <b>호국 불교</b>(ㄴ ○). 두 자료 모두 왕즉불 등 왕권을 뒷받침(ㄷ ○). ㄹ은 오답 — 황룡사 구층 목탑은 몽골 침입 때 소실되어 터만 남았다."}, {"u": 4, "t": "인물 · ㄱㄴㄷ", "src": "<div class=\"stim bogi\"><span class=\"stim-tag\">보기</span><ul><li>ㄱ. (가)는 천태종을 창시하고 교관겸수를 내세웠다.</li><li>ㄴ. (나)는 수선사 결사를 통해 불교 개혁을 추진하였다.</li><li>ㄷ. (나)는 돈오점수와 정혜쌍수를 주장하였다.</li><li>ㄹ. (가)는 선종을 중심으로 교종을 포용하려 하였다.</li></ul></div>", "q": "(가) 의천, (나) 지눌에 대한 설명으로 옳은 것만을 모두 고른 것은?", "c": ["ㄱ, ㄴ", "ㄱ, ㄴ, ㄷ", "ㄱ, ㄷ, ㄹ", "ㄴ, ㄷ, ㄹ", "ㄱ, ㄴ, ㄷ, ㄹ"], "a": 1, "e": "의천 = 천태종 창시·교관겸수(교종 중심으로 선종 포용)(ㄱ ○). 지눌 = 수선사 결사(ㄴ ○)·정혜쌍수·돈오점수(ㄷ ○). ㄹ은 오답 — <b>선종을 중심으로 교종을 포용</b>한 것은 의천이 아니라 지눌의 방향이다."}, {"u": 4, "t": "사료", "src": "<div class=\"stim saryo\"><span class=\"stim-tag\">사료 — 최승로의 시무 28조</span><p>불교를 믿는 것은 자신을 다스리는 근본이요, 유교를 행하는 것은 나라를 다스리는 근원입니다. … 가까운 것을 버리고 먼 것을 구함은 그릇된 일이 아니겠습니까.</p></div>", "q": "다음 글의 주장으로 가장 적절한 것은?", "c": ["불교를 폐지하고 유교만을 숭상해야 한다.", "수신은 불교가, 치국은 유교가 맡아 공존해야 한다.", "풍수지리설에 따라 서경으로 천도해야 한다.", "도교를 장려해 귀족 세력을 억제해야 한다.", "모든 백성에게 균등하게 토지를 분배해야 한다."], "a": 1, "e": "최승로는 불교(수신)와 유교(치국)의 역할을 구분하며 <b>공존</b>을 주장했다(불교 자체를 부정하지는 않음). 따라서 ②가 가장 적절하다. (훈요 10조 역시 불교·유교·풍수지리가 함께 강조된다.)"}, {"u": 4, "t": "부정형", "src": "", "q": "우리 역사 속 도교에 대한 설명으로 <b>옳지 않은</b> 것은?", "c": ["불로장생과 현세구복을 추구하였다.", "고구려 고분의 사신도에 방위신 신앙이 나타난다.", "백제 금동 대향로와 산수무늬 벽돌에 신선 사상이 담겨 있다.", "고구려의 연개소문은 도교를 장려해 불교·귀족 세력을 견제하였다.", "익산 미륵사지 석탑은 도교 사상을 대표하는 유물이다."], "a": 4, "e": "익산 미륵사지 석탑은 백제 <b>불교</b> 유물이다. ⑤가 옳지 않다. 도교 관련 유물은 사신도·금동 대향로·산수무늬 벽돌이며, 연개소문의 도교 장려도 자주 출제된다."}, {"u": 4, "t": "부정형", "src": "", "q": "조선 전기의 문화·과학에 대한 설명으로 <b>옳지 않은</b> 것은?", "c": ["세종 때 한양을 기준으로 한 역법서 『칠정산』이 편찬되었다.", "「혼일강리역대국도지도」는 태종 때 만든 세계 지도이다.", "앙부일구는 해시계, 자격루는 물시계이다.", "측우기로 강우량을, 혼천의로 천체의 운행을 측정하였다.", "훈민정음은 세조가 창제하여 반포하였다."], "a": 4, "e": "훈민정음은 <b>세종</b>이 창제(1443)하고 반포(1446)하였다. ⑤가 옳지 않다. 칠정산·혼일강리역대국도지도(태종)·앙부일구/자격루·측우기/혼천의는 모두 옳은 진술이다."}, {"u": 4, "t": "비교 · 부정형", "src": "", "q": "(가) 이황, (나) 이이에 대한 설명으로 <b>옳지 않은</b> 것은?", "c": ["(가)는 도덕적 행위의 근거로 이(理)를 중시하였다.", "(나)는 기(氣)를 중시하며 현실 개혁에 관심을 두었다.", "(나)는 황해도에서 해주 향약을 실시하였다.", "(가)의 사상은 일본 성리학에 영향을 주었다.", "(가)는 기(氣)를, (나)는 이(理)를 중시하여 학설이 서로 같았다."], "a": 4, "e": "이황은 <b>이(理)</b>(이상적), 이이는 <b>기(氣)</b>(현실·개혁적)를 중시하여 학설이 대비된다. ⑤는 둘을 뒤바꾸고 '같았다'고 한 명백한 오류다."}, {"u": 4, "t": "인물 · 부정형", "src": "", "q": "실학자와 그 주장이 바르게 연결되지 <b>않은</b> 것은?", "c": ["유형원 — 신분에 따라 토지를 차등 분배하는 균전론", "이익 — 생계 유지에 필요한 토지의 매매를 금지하는 한전론", "정약용 — 마을 단위로 공동 경작·분배하는 여전론, 거중기 고안", "박제가 — 소비를 우물에 비유하며 절약보다 소비를 강조", "박지원 — 마을 공동 경작·분배의 여전론을 주장하였다."], "a": 4, "e": "<b>여전론</b>은 정약용의 주장이다. 박지원은 『열하일기』로 대표되는 북학파로 수레·선박·화폐의 유통을 강조했다. ⑤의 연결이 잘못되었다. (중농학파 유형원·이익·정약용 ↔ 중상·북학파 박지원·박제가 구분이 핵심)"}, {"u": 4, "t": "사료 · ㄱㄴㄷ", "src": "<div class=\"stim saryo\"><span class=\"stim-tag\">사료 — 박제가, 『북학의』</span><p>재물은 우물과 같다. 퍼 쓸수록 가득 차고, 이용하지 않으면 말라 버린다. 비단을 입지 않으니 나라 안에 비단 짜는 사람이 없다.</p></div><div class=\"stim bogi\"><span class=\"stim-tag\">보기</span><ul><li>ㄱ. 청의 선진 문물을 적극 수용하자고 하였다.</li><li>ㄴ. 상공업의 진흥과 기술 혁신을 강조하였다.</li><li>ㄷ. 토지 제도 개혁을 통한 자영농 육성을 최우선으로 삼았다.</li><li>ㄹ. 그 사상은 19세기 후반 개화사상으로 이어졌다.</li></ul></div>", "q": "다음 주장을 한 인물이 속한 학파의 경향으로 옳은 것만을 모두 고른 것은?", "c": ["ㄱ, ㄴ", "ㄱ, ㄷ", "ㄱ, ㄴ, ㄹ", "ㄴ, ㄷ, ㄹ", "ㄱ, ㄴ, ㄷ, ㄹ"], "a": 2, "e": "박제가는 <b>북학파(중상)</b>이다. 청의 선진 문물 수용(ㄱ ○), 상공업·기술 혁신 강조(ㄴ ○), 그 사상이 19세기 후반 개화사상으로 계승(ㄹ ○). ㄷ은 중농학파(유형원·이익·정약용)의 경향이라 제외된다."}, {"u": 4, "t": "부정형", "src": "", "q": "조선 후기의 새로운 사상에 대한 설명으로 <b>옳지 않은</b> 것은?", "c": ["『정감록』 등 왕조 교체를 예언하는 사상이 유행하였다.", "천주교는 인간 평등을 내세웠으나 제사 거부로 탄압받았다.", "동학은 최제우가 창시하였으며 시천주 사상을 강조하였다.", "동학은 정부의 보호를 받으며 빠르게 공인되었다.", "천주교는 청을 다녀온 사신을 통해 서학으로 소개되었다."], "a": 3, "e": "정부는 동학을 세상을 어지럽히는 <b>사교</b>로 규정하고 교조 최제우를 처형하였다. ④가 옳지 않다. 나머지는 모두 옳다."}, {"u": 4, "t": "부정형", "src": "", "q": "『조선왕조실록』에 대한 설명으로 <b>옳지 않은</b> 것은?", "c": ["사초, 시정기, 『승정원일기』 등을 바탕으로 편찬되었다.", "초초·중초·정초의 단계를 거쳐 완성되었다.", "편찬을 마친 뒤 사초와 원고를 물에 씻는 세초를 하였다.", "임진왜란 때 전주 사고본만이 보존되었다.", "태조부터 순종까지 모든 국왕의 실록이 동등하게 편찬되었다."], "a": 4, "e": "고종·순종 실록은 일제 강점기에 편찬되어 왜곡 우려가 있어 일반적으로 『조선왕조실록』(태조~철종)에 포함하지 않는다. ⑤가 옳지 않다. 세초·전주 사고·편찬 단계는 모두 옳은 진술이다."}, {"u": 4, "t": "자료 매칭", "src": "<div class=\"stim saryo\"><span class=\"stim-tag\">자료</span><p><b>①</b> 효자·충신·열녀의 행적을 그림과 글로 엮은 책을 반포하니 모두 본받으라.</p><p><b>②</b> 먼 지방의 물자를 옮기는 데 수레가 매우 유용하다.</p><p><b>③</b> 천주께서 모든 사람은 평등하다 하셨으니 누구나 귀하게 대해야 한다.</p></div>", "q": "자료 ①~③이 각각 보급·확산하려 한 사상을 바르게 연결한 것은?", "c": ["①성리학 ②실학 ③천주교", "①실학 ②성리학 ③동학", "①성리학 ②천주교 ③실학", "①천주교 ②실학 ③성리학", "①실학 ②동학 ③천주교"], "a": 0, "e": "① 효자·충신·열녀의 행적(삼강행실도) = <b>성리학적 윤리·신분 질서</b>, ② 수레로 물자 유통 = <b>실학(중상)</b>, ③ 만민 평등 = <b>천주교(서학)</b>. 정답은 ①이다."}, {"u": 2, "t": "유물 · 부정형", "src": "<div class=\"stim figbox\"><span class=\"stim-tag\">유물</span><div class=\"figrow\"><figure class=\"qfig\"><img src=\"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAQDAwMDAgQDAwMEBAQFBgoGBgUFBgwICQcKDgwPDg4MDQ0PERYTDxAVEQ0NExoTFRcYGRkZDxIbHRsYHRYYGRj/2wBDAQQEBAYFBgsGBgsYEA0QGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBj/wAARCAD7APoDASIAAhEBAxEB/8QAHQAAAQUBAQEBAAAAAAAAAAAAAAMEBQYHCAkBAv/EAFMQAAEDAgQDAwYHCwgJBAMAAAMABAUGEwEHIzMUQ1MRFWMCFiEkc4MIJTFBk7PTFyY0NVFhcYGjw+M2RFRVhZGx8BIiMkJFZHSVoTdSZZTB0fP/xAAaAQADAQEBAQAAAAAAAAAAAAAAAwQFAQIG/8QAJREBAQACAQMEAgMBAAAAAAAAAAMBEwQRIzMUITFDBVMVUWNB/9oADAMBAAIRAxEAPwDv5CEIAQhCAEIQgBCEIAQkjGEEN0pcBjw+fFZrP5ywDAx2UCA827Hhh6QdnC9v5zfIjqOjTMMfSoyVnIWEZ35eTaMxf+4xexc5yuZ9XVE41qh7nD/Q4z7ZVdp3J+GmAAxi842sZR25s5K5cKmW8vM8KHDh2MCSMsT8jJtj5X+PYoMmdc2TD4sobHD/AKuQww//AAsiLUXRSLuqNC/0lH/J1/Uf6OTT3ecdd4+T2CjIBn7bExf8FHFzjzHw+QlO/wD0zfbLMHc5z+SpFobiwXwn1kr1tjvRyX4WdOYIcNVvTxf0BL9sn7bPioReT/ou6TjiexeWv8e1ZxrJG8C+kfylR/GSbVH58xhMOybpmZjcOqLC9h/4Vwh8z6Bm/LxA0qdngXDlOscQY4/qJ2LmUu+HQvGFsodhAYGsABk6P5jr8k/xjs30o7VxxFS8pB69NzcnGh6Idn6FaTAZ6zTU4gVVDBeBx/nkbu/QrSjzZWSW4dZOgUKt05WVNVWxvwEmA3Z5PpD29hRfpH8qsisICEIQAhCEAIQhACEIQAhCEAIQhACEJo4cAaNCHcm8kQR4dpCk+TsQDrDs/KqBV+ZcLTzruxn5OMrL+nDgweV6Be2L8gv1qj1nmiaXwIzp54WNisMPTJYbrz8wejh6d5Za7kQcDYjQe2s85RW5mJHRhtS1U1ZJ1A8w8mqZXE2GH/DWeNpoH7ZQfeJ7Fjk8mzyVHCsWNYF72yW8AyzrX2tKONJnxZzANe0fGSO8+CDq9HkqS4RlY1tlRpXYA7O8kjqNc2sHrclAmhzMTaCS4vQ0T6N5 "상평통보\"><figcaption>상평통보</figcaption></figure></div></div>", "q": "위 화폐가 널리 유통되던 시기의 경제 상황으로 <b>옳지 않은</b> 것은?", "c": ["세금이나 소작료를 동전으로 내기도 하였다.", "송상·만상 등 사상이 대청 무역으로 부를 축적하였다.", "정조가 육의전을 제외한 시전의 금난전권을 폐지하였다.", "한양에서는 오직 시전 상인만 상업 활동을 할 수 있었다.", "일부 상인이 독점적 도매상인인 도고로 성장하였다."], "a": 3, "e": "상평통보는 조선 후기에 널리 유통되었다. 이 시기에는 사상이 활발히 활동했으므로 ‘시전 상인만 상업이 가능했다’는 ④는 옳지 않다(조선 전기에 가까운 상황). 나머지는 모두 조선 후기의 모습이다."}, {"u": 2, "t": "ㄱㄴㄷ", "src": "<div class=\"stim bogi\"><span class=\"stim-tag\">보기</span><ul><li>ㄱ. 대동법 시행으로 관청에 물품을 납품하는 공인이 등장하였다.</li><li>ㄴ. 균역법의 부족분을 메우려 지주에게 토지 1결당 결작을 거두었다.</li><li>ㄷ. 일부 부유한 양인에게 선무군관포를 거두었다.</li><li>ㄹ. 균역법으로 군포가 1년에 1필에서 2필로 늘었다.</li></ul></div>", "q": "조선 후기 수취 제도의 재정 보충책에 대한 설명으로 옳은 것만을 모두 고른 것은?", "c": ["ㄱ, ㄴ", "ㄷ, ㄹ", "ㄱ, ㄴ, ㄷ", "ㄱ, ㄷ, ㄹ", "ㄴ, ㄷ, ㄹ"], "a": 2, "e": "대동법 → 관청에 물품을 납품하는 공인 등장(ㄱ ○). 균역법의 부족분은 지주에게 결작(ㄴ ○)·부유한 양인에게 선무군관포(ㄷ ○)로 보충. ㄹ은 반대 — 균역법으로 군포가 2필에서 1필로 줄었다."}, {"u": 3, "t": "사료 · ㄱㄴㄷ", "src": "<div class=\"stim saryo\"><span class=\"stim-tag\">자료</span><p><b>(가) 『한서』</b> — 남의 물건을 훔친 자는 그 집의 노비로 삼는다.</p><p><b>(나) 『삼국지』 「부여전」</b> — 읍락에 호민이 있고, 하호라 불리는 자들은 모두 노복과 같다.</p></div><div class=\"stim bogi\"><span class=\"stim-tag\">보기</span><ul><li>ㄱ. (가)에서 고조선에 노비가 존재했음을 알 수 있다.</li><li>ㄴ. (나)에서 부여 읍락에 부유한 호민이 있었음을 알 수 있다.</li><li>ㄷ. 두 사회 모두 지배층과 피지배층으로 분화되어 있었다.</li><li>ㄹ. 두 사회 모두 골품제로 신분을 엄격히 구분하였다.</li></ul></div>", "q": "(가), (나)를 통해 알 수 있는 사실로 옳은 것만을 모두 고른 것은?", "c": ["ㄱ, ㄴ", "ㄱ, ㄴ, ㄷ", "ㄱ, ㄷ, ㄹ", "ㄴ, ㄷ, ㄹ", "ㄱ, ㄴ, ㄷ, ㄹ"], "a": 1, "e": "(가) 고조선의 노비 존재(ㄱ ○), (나) 부여의 호민·하호 분화(ㄴ ○), 두 사회 모두 지배층·피지배층으로 계층 분화(ㄷ ○). ㄹ은 오답 — 골품제는 신라의 신분 제도다."}, {"u": 3, "t": "ㄱㄴㄷ", "src": "<div class=\"stim bogi\"><span class=\"stim-tag\">보기</span><ul><li>ㄱ. 법제적으로 양인과 천인으로 나누는 양천제를 운영하였다.</li><li>ㄴ. 직역을 맡지 않은 일반 농민을 백정이라 불렀다.</li><li>ㄷ. 향·부곡·소의 주민은 일반 군현민보다 무거운 부담을 졌다.</li><li>ㄹ. 양인과 천인 사이에 태어난 자녀는 모두 양인이 되었다.</li></ul></div>", "q": "고려의 신분 제도에 대한 설명으로 옳은 것만을 모두 고른 것은?", "c": ["ㄱ, ㄴ", "ㄱ, ㄴ, ㄷ", "ㄱ, ㄷ, ㄹ", "ㄴ, ㄷ, ㄹ", "ㄱ, ㄴ, ㄷ, ㄹ"], "a": 1, "e": "고려는 양천 li><li>ㄷ. 고구려의 연개소문이 장려하여 귀족·불교 세력을 견제하였다.</li><li>ㄹ. 삼국 모두 왕실이 일반 백성에게 널리 보급하였다.</li></ul></div>", "q": "위 문화유산에 공통적으로 반영된 사상에 대한 설명으로 옳은 것만을 모두 고른 것은?", "c": ["ㄱ, ㄴ", "ㄴ, ㄹ", "ㄱ, ㄴ, ㄷ", "ㄱ, ㄷ, ㄹ", "ㄱ, ㄴ, ㄷ, ㄹ"], "a": 2, "e": "사신도·금동 대향로·산수무늬 벽돌은 모두 <b>도교</b>의 영향을 받았다. 불로장생·현세구복(ㄱ ○), 신선 사상(ㄴ ○), 연개소문의 도교 장려(ㄷ ○). ㄹ은 오답 — 도교는 주로 귀족 사회에서 유행했고 백성에게 널리 보급되지는 않았다."}, {"u": 4, "t": "유물 식별 · 부정형", "src": "<div class=\"stim figbox\"><span class=\"stim-tag\">유물</span><div class=\"figrow\"><figure class=\"qfig\"><img src=\"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAQDAwMDAgQDAwMEBAQFBgoGBgUFBgwICQcKDgwPDg4MDQ0PERYTDxAVEQ0NExoTFRcYGRkZDxIbHRsYHRYYGRj/2wBDAQQEBAYFBgsGBgsYEA0QGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBj/wAARCAGDAPIDASIAAhEBAxEB/8QAGwAAAgMBAQEAAAAAAAAAAAAAAAMFBgcEAQj/xABFEAABBAECAwQHBwMBBQcFAAADAAQFEyMGMxRDUwcVY3MBJDSDk6PwFiVEYbPD0xHj81QXITVkdQIIEiYxVXQ3UYGExP/EABsBAQADAQEBAQAAAAAAAAAAAAADBQYEAQcC/8QAKhEBAQACAQQBBAEEAwEAAAAAAAMBEwQFESMzFAYhMUM0AkFRYxUkU3P/2gAMAwEAAhEDEQA/AMdQnIXY4yUJyECUJyETEpyEIhJTkIRMElOQgSnIQgShOEE5tkFy5OLzmBwNxheMvPkYi9+Pk1CT3iALEx3mEy9aSIHdwOcJRb9zzRmJqE5CmQkoTkIEoTkIEoTkIEoTkIEoTkICn80IQiYITkIhCSnIRMEIQgEIQgElOQgShOThBObPQelQ2vKL2MM1cac0NF96swST3gwl51N1KaUJ77zH7tD52ZRAmj0JwnM9CbnG6Krb9Tl+pYw6ZVb5DVEXwPcmm4s8aHnGNvPPOVcLQEFDMAKVxu8IDYMxudcgVCou+cr3GMAobuQlFabJ2eF4JDs1O9fvJIgvb+Nvw9GlTYznBnGMpETsBjmBsmDyU5RBfIzB53OUiV3gvMA/uVew6l/6qK/Tf7yOQnFDTvIVl37q3t2JQnIRCShOQgShOQgShOQgShOQgEJyETBCEIBCEIBCEIBdcJHAl5XgjPQMw843RXW0EyjpVmCYA9M7KG7gg8nzlLlMBoxCyZ/J6yp+b1PV4orLhdM2+0qVDp5oAwI1kfhBbxjbxv4VHFw056QhzLrKUAcHnLkNvmWbzetfa0kISi43fjAUcYO8DwTKXpuObwjIdtKQGuUO5Mq8gH14Nx/q7/Ck0nMAOfdp9z9XKXdtAUdYIvkoE0YhBhuXZvcmlHFaXH40Jk0TQ4WNF5zLspBv9VGZRbkuhxlDTnQI3IXIZ5no6ubMm8+gylQpLvE94QPL+E+cnCDxYLwg9yo0V9GZO8lTQ5tZIbcKVTkI4vBQYF3RMgRuM2ffB6K0kepyqob8KsghOQuxWkoTkIEoTkIEoTkIBCchAIQhAIQhEwVihIgHcZpt4f8A+JT1k3T+kjyMUaUNhaCwh8ZSUrQFjQEAAtBG5PRWb6n1P9MVx0zhftsgpAx3ec2arDcbwd5Rxb6AgDhUiIPxhBD87MklDxYMNGzzvJVC0mHIINwMwAeCuvAFjf75 const CIRC = ['①','②','③','④','⑤','⑥','⑦'];
const UNAME = {2:'경제', 3:'신분제', 4:'사상·문화'};
let filter = 'all';
let revealAll = false;
const state = {};   // idx -> {picked, correct}

const root = document.getElementById('quiz');
const empty = document.getElementById('empty');

// image lightbox (delegated, images re-render each pass)
const lb = document.getElementById('lb'), lbimg = lb.querySelector('img');
document.addEventListener('click', e=>{
  const im = e.target.closest('.qfig img');
  if(im){ lbimg.src = im.src; lb.style.display='flex'; }
});
lb.addEventListener('click', ()=>{ lb.style.display='none'; lbimg.src=''; });
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ lb.style.display='none'; lbimg.src=''; }});

function visible(){ return Q.map((q,i)=>({q,i})).filter(o => filter==='all' || String(o.q.u)===filter); }

function render(){
  root.innerHTML='';
  const vis = visible();
  empty.style.display = vis.length? 'none':'block';
  vis.forEach(({q,i})=>{
    const answered = state[i]!==undefined;
    const show = answered || revealAll;
    const card = document.createElement('div');
    card.className = 'card u'+q.u;
    let h = '';
    h += '<div class="qhead"><span class="qno mono">문 '+String(i+1).padStart(2,'0')+'</span>'+
         '<span class="badge b'+q.u+'">'+UNAME[q.u]+'</span>'+
         '<span class="badge btype">'+q.t+'</span></div>';
    if(q.src) h += q.src;
    h += '<div class="qstem">'+q.q+'</div>';
    h += '<div class="opts'+(show?' locked':'')+'">';
    q.c.forEach((txt,ci)=>{
      let cls='opt';
      let mark='';
      if(show){
        cls+=' locked';
        if(ci===q.a){ cls+=' correct'; mark='<span class="mark">정답</span>'; }
        else if(answered && state[i].picked===ci){ cls+=' wrong'; mark='<span class="mark">내 답</span>'; }
      }
      h += '<button class="'+cls+'" data-i="'+i+'" data-c="'+ci+'"'+(show?' disabled':'')+'>'+
           '<span class="bub mono">'+CIRC[ci]+'</span><span class="otext">'+txt+'</span>'+mark+'</button>';
    });
    h += '</div>';
    h += '<div class="expl'+(show?' show':'')+'"><span class="etag">해설</span>'+
         '<span class="ans">정답 '+CIRC[q.a]+'</span> &nbsp;'+q.e+'</div>';
    card.innerHTML = h;
    root.appendChild(card);
  });
  bind();
  updateScore();
}

function bind(){
  root.querySelectorAll('.opt:not([disabled])').forEach(b=>{
    b.addEventListener('click',()=>{
      const i=+b.dataset.i, ci=+b.dataset.c;
      if(state[i]!==undefined) return;
      state[i]={picked:ci, correct:(ci===Q[i].a)};
      render();
    });
  });
}

function updateScore(){
  const done = Object.keys(state).length;
  const ok = Object.values(state).filter(s=>s.correct).length;
  const pct = done? Math.round(ok/done*100):0;
  document.getElementById('scoreTxt').innerHTML =
    '<b>'+ok+'</b> / '+done+' 정답 <span class="pct">('+pct+'%)</span> · 총 '+Q.length+'문';
  // result panel when all answered
  const res=document.getElementById('result');
  if(done===Q.length && done>0){
    const byU={2:[0,0],3:[0,0],4:[0,0]};
    Q.forEach((q,i)=>{ if(state[i]){ byU[q.u][1]++; if(state[i].correct) byU[q.u][0]++; }});
    document.getElementById('resMain').innerHTML = '<span class="pct">'+ok+'</span> / '+Q.length+' 정답';
    document.getElementById('resSub').textContent =
      pct>=90?'완벽에 가까워요. 시험 준비 끝!':pct>=75?'안정권이에요. 틀린 부분만 다시 보면 충분해요.':
      pct>=60?'기본기는 잡혔어요. 해설 위주로 보강해 봐요.':'해설을 꼼꼼히 읽으며 한 번 더 정리해 봐요.';
    document.getElementById('resBy').innerHTML =
      Object.keys(byU).map(u=>UNAME[u]+' '+byU[u][0]+'/'+byU[u][1]).map(s=>'<span>'+s+'</span>').join('');
    res.classList.add('show');
  } else { res.classList.remove('show'); }
}

// tabs
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    t.classList.add('on'); filter=t.dataset.f; render();
    window.scrollTo({top:0,behavior:'smooth'});
  });
});
// reveal all
document.getElementById('revealBtn').addEventListener('click',function(){
  revealAll=!revealAll; this.textContent=revealAll?'정답 숨기기':'정답·해설 모두 보기'; render();
});
// reset
document.getElementById('resetBtn').addEventListener('click',()=>{
  for(const k in state) delete state[k];
  revealAll=false; document.getElementById('revealBtn').textContent='정답·해설 모두 보기';
  render(); window.scrollTo({top:0,behavior:'smooth'});
});

render();
</script>
</body>
</html>
